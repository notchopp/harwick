name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: npm
      - run: npm install
      - run: npm run release:check
      - run: npm run build
